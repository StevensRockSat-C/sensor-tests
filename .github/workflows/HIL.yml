name: HIL

on:
  workflow_dispatch:
  
jobs:
  hil:
    runs-on: self-hosted
    steps:
    - name: Print to console
      run: |
        echo "Running on the Pi!!" 
    - name: Start test process
    - uses: actions/checkout@v3  
    - name: Set up Python 3.9
      uses: actions/setup-python@v4  
      with:  
        python-version: 3.9
    - name: Install dependencies  
      run: |
          python -m pip install --upgrade pip  
          pip install pytest
